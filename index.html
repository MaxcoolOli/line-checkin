<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>定位打卡</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;padding:16px}
    button{font-size:18px;padding:12px 16px;width:100%}
    .card{margin-top:12px;padding:12px;border:1px solid #ddd;border-radius:10px}
    .ok{color:#0a7}
    .bad{color:#c00}
    pre{white-space:pre-wrap;word-break:break-word;margin:0}
  </style>
</head>
<body>
  <h2>定位打卡（博愛路156號 / 10m）</h2>
  <button id="btn" onclick="checkin()">打卡</button>

  <div class="card">
    <div id="status">初始化中...</div>
  </div>

  <div class="card">
    <pre id="log"></pre>
  </div>

<script>
  // ===== 之後會填 =====
  const LIFF_ID = "2008916340-5lPBZ80w";
  const API_URL = "https://walked-hispanic-revenue-incentive.trycloudflare.com/api/checkin";

  const $status = document.getElementById("status");
  const $log = document.getElementById("log");
  const $btn = document.getElementById("btn");

  function setStatus(msg, ok){
    $status.innerHTML = ok ? `<span class="ok">${msg}</span>` : `<span class="bad">${msg}</span>`;
  }
  function log(obj){
    $log.textContent += (typeof obj === "string" ? obj : JSON.stringify(obj, null, 2)) + "\n";
  }

  async function init(){
    try{
      await liff.init({ liffId: LIFF_ID });
      if(!liff.isLoggedIn()) liff.login();
      setStatus("LIFF 已就緒，請按打卡", true);
    }catch(e){
      setStatus("LIFF 初始化失敗（正常，稍後會補 LIFF ID）", false);
    }
  }

  async function getPos(){
    return await new Promise((resolve, reject)=>{
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      });
    });
  }

  async function checkin(){
    $btn.disabled = true;
    $log.textContent = "";
    try{
      setStatus("取得定位中...", true);

      const pos = await getPos();
      const payload = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        accuracy: pos.coords.accuracy,
        idToken: liff.getIDToken()
      };

      log("定位資料：");
      log(payload);

      setStatus("送出打卡...", true);

      const resp = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify(payload)
      });

      const data = await resp.json();
      log("後端回應：");
      log(data);

      if(data.ok){
        setStatus("✅ 打卡成功", true);
      }else{
        setStatus("❌ 打卡失敗：" + (data.message || ""), false);
      }
    }catch(e){
      setStatus("❌ 打卡失敗（定位或網路問題）", false);
      log(String(e));
    }finally{
      $btn.disabled = false;
    }
  }

  init();
</script>
</body>
</html>
